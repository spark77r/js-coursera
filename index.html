<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nature Gallery</title>
<link rel="stylesheet" href="style.css">
<script>
function uiUpdate(){
  document.getElementById('image').style.backgroundImage="url('https://picsum.photos/400/250?99')";
  document.getElementById('image').textContent="Mouse is over the image!";
}
function uiReset(){
  document.getElementById('image').style.backgroundImage="url('https://picsum.photos/400/250?1')";
  document.getElementById('image').textContent="Hover over the image";
}
</script>
</head>
<body>
<a class="skip-link" href="#main">Skip to main content</a>
<header><h1>Nature Gallery</h1></header>
<main id="main">
<div id="image" onmouseover="uiUpdate()" onmouseout="uiReset()"
style="width:400px;height:250px;background:url('https://picsum.photos/400/250?1');display:flex;align-items:center;justify-content:center;border:2px solid #000;margin:20px;">
Hover over the image
</div>
</main>
</body>
</html>
